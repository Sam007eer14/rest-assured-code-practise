# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Test Automation Workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule: #set the CRON for Midnight IST --- UTC
     - cron: "30 18 * * *" 
     workflow_dispatch:
    inputs:
      suite:
        description: "Select TestNG"
        required: true
        type: choice
        default: "testng.xml"
        type: choice
        options:
          - testng.xml
          - regression.xml
          - smoke.xml

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Execute Test Automation Framework
      run: mvn clean package -DsuiteXmlFile=${{ github.event.inputs.suite }}

    # ✅ Upload Test Reports
    - name: Upload Surefire Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: SureFire Report
        path: target/surefire-reports/
        retention-days: 10
        
    # ✅ Upload Build Artifact (JAR)
    - name: Upload Build Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Build Artifact
        path: target/*.jar
        retention-days: 10
        
    # ✅ Dependency graph (won’t fail build)
    - name: Update dependency graph
      if: always()
      continue-on-error: true
      uses: advanced-security/maven-dependency-submission-action@v3
